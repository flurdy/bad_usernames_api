version: 2.1

# CI for Bad Usernames API.
#
# Single 'build' job: format check + compile + test — the same gate as
# `make ci`. Docker image build/publish and integration/contract jobs
# are intentionally omitted; they belong with future release/test tiers.

jobs:
  build:
    docker:
      - image: sbtscala/scala-sbt:eclipse-temurin-17.0.15_6_1.10.11_3.3.6
    working_directory: ~/repo
    environment:
      JAVA_OPTS: -Xmx2048m -Xss8m
      TERM: dumb
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "build.sbt" }}-{{ checksum ".circleci/config.yml" }}-{{ checksum "Makefile" }}-{{ checksum "project/build.properties" }}-{{ checksum "project/plugins.sbt" }}
      - run:
          name: CI gate
          command: cat /dev/null | make ci
      - save_cache:
          paths:
            - ~/.m2
            - ~/.ivy2/cache
            - ~/.sbt
            - ~/.cache/coursier
          key: v1-dependencies-{{ checksum "build.sbt" }}-{{ checksum ".circleci/config.yml" }}-{{ checksum "Makefile" }}-{{ checksum "project/build.properties" }}-{{ checksum "project/plugins.sbt" }}
      - store_test_results:
          path: target/test-reports

workflows:
  build:
    jobs:
      - build

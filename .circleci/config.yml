version: 2.1

# CI for Bad Usernames API.
#
# Requires project or context environment variables for publishing:
# - DOCKER_LOGIN: Quay.io robot/user login
# - DOCKER_PASSWORD: Quay.io robot/user password or token
#
# All branches run the Scala CI gate and build the Docker image. The main branch
# also publishes the image to Quay.io as latest and 0.1.<build>.

jobs:
  build:
    docker:
      - image: sbtscala/scala-sbt:eclipse-temurin-17.0.15_6_1.10.11_3.3.6
    working_directory: ~/repo
    environment:
      JAVA_OPTS: -Xmx2048m -Xss8m
      TERM: dumb
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "build.sbt" }}-{{ checksum ".circleci/config.yml" }}-{{ checksum "Makefile" }}-{{ checksum "project/build.properties" }}-{{ checksum "project/plugins.sbt" }}
      - run:
          name: CI gate
          command: cat /dev/null | make ci
      - save_cache:
          paths:
            - ~/.m2
            - ~/.ivy2/cache
            - ~/.sbt
            - ~/.cache/coursier
          key: v1-dependencies-{{ checksum "build.sbt" }}-{{ checksum ".circleci/config.yml" }}-{{ checksum "Makefile" }}-{{ checksum "project/build.properties" }}-{{ checksum "project/plugins.sbt" }}
      - store_test_results:
          path: target/test-reports

  build-image:
    docker:
      - image: cimg/base:stable
    working_directory: ~/repo
    environment:
      IMAGE_NAME: quay.io/flurdy/bad-usernames-api
      IMAGE_BASE_VERSION: "0.1"
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build Docker image
          command: make docker-build IMAGE=$IMAGE_NAME:latest
      - run:
          name: Archive Docker image
          command: docker save -o image.tar $IMAGE_NAME:latest
      - persist_to_workspace:
          root: .
          paths:
            - image.tar

  publish-image:
    docker:
      - image: cimg/base:stable
    working_directory: ~/repo
    environment:
      IMAGE_NAME: quay.io/flurdy/bad-usernames-api
      IMAGE_BASE_VERSION: "0.1"
    steps:
      - setup_remote_docker
      - attach_workspace:
          at: .
      - run:
          name: Load archived Docker image
          command: docker load -i image.tar
      - run:
          name: Publish image to Quay.io
          command: |
            IMAGE_VERSION="$IMAGE_BASE_VERSION.$CIRCLE_BUILD_NUM"

            echo "$DOCKER_PASSWORD" | docker login quay.io -u "$DOCKER_LOGIN" --password-stdin

            docker tag "$IMAGE_NAME:latest" "$IMAGE_NAME:$IMAGE_VERSION"

            docker push "$IMAGE_NAME:latest"
            docker push "$IMAGE_NAME:$IMAGE_VERSION"

workflows:
  build:
    jobs:
      - build
      - build-image:
          requires:
            - build
      - publish-image:
          requires:
            - build-image
          filters:
            branches:
              only: main
